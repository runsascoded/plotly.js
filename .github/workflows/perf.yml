name: Performance benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bundle: [lite, minimal, basic]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run perf benchmark (${{ matrix.bundle }})
        run: |
          if [ "${{ matrix.bundle }}" = "minimal" ]; then
            pnpm run perf
          elif [ "${{ matrix.bundle }}" = "basic" ]; then
            pnpm run perf:basic
          else
            pnpm run perf:lite
          fi

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.bundle }}
          path: perf/results/

  bundle-compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compare bundle sizes (fork vs upstream)
        run: node perf/bundle-compare/compare.mjs
